name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate custom-palette snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: khaatriinaa
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2338bdf8&color_dots=%23161b22,%2339237e,%236c3ec2,%23a374ff,%23d9c8ff
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2338bdf8&color_dots=%230d1117,%2339237e,%236c3ec2,%23a374ff,%23d9c8ff

      - name: Push SVGs to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
